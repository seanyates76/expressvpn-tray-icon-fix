name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  arch-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install build dependencies
        run: pacman -Sy --noconfirm --needed base-devel git imagemagick pkgconf qt6-base qt6-declarative

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare builder user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Syntax checks
        shell: bash
        run: |
          bash -n packaging/bin/expressvpn-tray-icon-fix
          bash -n packaging/bin/expressvpn-tray-icon-fix-integrate
          sh -n packaging/arch/expressvpn-tray-icon-fix.install
          bash -n scripts/*.sh

      - name: Regenerate SRCINFO
        shell: bash
        run: runuser -u builder -- make srcinfo

      - name: Build Arch package
        shell: bash
        run: runuser -u builder -- make package-arch
